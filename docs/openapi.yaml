openapi: 3.0.3
info:
  title: Alsintan API
  version: "1.0.0"
  description: |
    Spesifikasi mesin: **Auth**, **Me**, **Telemetry (device)**.
    Path traktor, zona kerja, KPI: **`docs/api/mobile/openapi.yaml`**.
    Pelacakan traktor di peta OSM (mobile): **`docs/README-LENGKAP-MOBILE-UNIT-PETA-GPS.md`**. Ringkas kontrak: `docs/api-contract.md`.

servers:
  - url: http://localhost:8000/api/v1
    description: Development
  - url: https://{host}/api/v1
    description: Produksi
    variables:
      host:
        default: alsintan.example.com

tags:
  - name: Auth
  - name: Me
  - name: Telemetry

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    deviceToken:
      type: apiKey
      in: header
      name: X-Device-Token

  schemas:
    User:
      type: object
      properties:
        id: { type: integer, example: 2 }
        name: { type: string, example: "Demo Admin" }
        email: { type: string, format: email, example: "demo@alsintan.id" }
        phone: { type: string, nullable: true, example: "0811xxx" }
        avatar_url: { type: string, nullable: true, format: uri }
        role: { type: string, enum: [admin, operator] }
        preferences:
          $ref: '#/components/schemas/Preferences'
        email_verified_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    Preferences:
      type: object
      properties:
        theme_mode: { type: string, enum: [system, light, dark], example: system }
        language: { type: string, enum: [id, en], example: id }
      additionalProperties: true

    AuthSession:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [user, token]
          properties:
            user: { $ref: '#/components/schemas/User' }
            token:
              type: string
              description: |
                Base64 (standard) dari JSON UTF-8. Setelah decode, objek berisi:
                `access` (JWT), `refresh` (string rt_*), `token_type` (mis. Bearer),
                `access_expires_in`, `refresh_expires_in` (detik).
              example: "eyJhY2Nlc3MiOi..."
            message:
              type: string
              description: Opsional; disertakan setelah reset password atau PATCH /me/password.

    AuthLogoutOk:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [message]
          properties:
            message: { type: string, example: "Logout berhasil" }

    AuthForgotOk:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [message, otp_ttl_seconds]
          properties:
            message: { type: string }
            otp_ttl_seconds: { type: integer, example: 900 }

    Error:
      type: object
      required: [message, code]
      properties:
        message: { type: string, example: "Token tidak valid atau kedaluwarsa" }
        code: { type: string, example: unauthorized }

    ValidationError:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items: { type: string }

  responses:
    Unauthorized:
      description: Token tidak valid
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Validation:
      description: Data tidak valid
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ValidationError' }
    TooManyRequests:
      description: Rate limit
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - type: object
                properties:
                  retry_after: { type: integer }

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
                device_name: { type: string, example: "Pixel 8 — Flutter" }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSession' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/Validation' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotasi refresh token → pasangan baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSession' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh token klien
      security: [ { bearerAuth: [] } ]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthLogoutOk' }

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Kirim OTP reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: Selalu 200 untuk mencegah enumerasi email
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthForgotOk' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Tukar OTP → set password baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code, password, password_confirmation]
              properties:
                email: { type: string, format: email }
                code: { type: string, minLength: 6, maxLength: 6 }
                password: { type: string, format: password, minLength: 8 }
                password_confirmation: { type: string, format: password }
      responses:
        '200':
          description: Sesi baru (sama bentuk login) + pesan di `data.message`
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSession' }
        '422': { $ref: '#/components/responses/Validation' }

  /me:
    get:
      tags: [Me]
      summary: Profil user saat ini
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    patch:
      tags: [Me]
      summary: Update nama / telepon
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, maxLength: 120 }
                phone: { type: string, maxLength: 32, nullable: true }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '422': { $ref: '#/components/responses/Validation' }

  /me/avatar:
    post:
      tags: [Me]
      summary: Upload avatar (multipart)
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
                  description: jpg/jpeg/png/webp, max 2 MB
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
    delete:
      tags: [Me]
      summary: Hapus avatar
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }

  /me/password:
    patch:
      tags: [Me]
      summary: Ganti password
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, password, password_confirmation]
              properties:
                current_password: { type: string, format: password }
                password: { type: string, format: password, minLength: 8 }
                password_confirmation: { type: string, format: password }
      responses:
        '200':
          description: Sesi baru (envelope) + `data.message`; semua refresh lama dicabut
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSession' }
        '422': { $ref: '#/components/responses/Validation' }

  /me/preferences:
    get:
      tags: [Me]
      summary: Ambil preferensi
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Preferences' }
    put:
      tags: [Me]
      summary: Simpan preferensi (merge dengan yang ada)
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Preferences'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Preferences' }

  /telemetry/ingest:
    post:
      tags: [Telemetry]
      summary: Ingest telemetri dari device IoT
      security: [ { deviceToken: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tractor_id, lat, lng, ts]
              properties:
                tractor_id: { type: string, example: T-01 }
                lat: { type: number, format: double }
                lng: { type: number, format: double }
                fuel_lph: { type: number, format: double, nullable: true }
                speed_kph: { type: number, format: double, nullable: true }
                hours_meter: { type: number, format: double, nullable: true }
                ts: { type: string, format: date-time }
                raw_payload: { type: object, additionalProperties: true }
      responses:
        '202':
          description: Diterima (antri pemrosesan)
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/Validation' }
